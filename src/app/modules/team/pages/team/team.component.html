<section class="team-page">
  <div class="page-hero">
    <div>
      <h2>Team management</h2>
      <p>Manage members, roles, and invitations.</p>
    </div>
    <ui-button [disabled]="!canInvite" (click)="openInviteModal()">Invite member</ui-button>
  </div>

  <ui-card>
    <ui-table-toolbar
      title="Members"
      subtitle="Search by name, role, or status."
      searchPlaceholder="Search members"
      searchAriaLabel="Search team members"
      [searchValue]="query.search ?? ''"
      [filters]="tableFilters"
      [showExport]="true"
      [exportDisabled]="isLoadingMembers || (membersResult?.total ?? 0) === 0"
      (searchChange)="updateSearch($event)"
      (filterChange)="updateFilter($event.key, $event.value)"
      (export)="exportMembers()">
      <ng-container toolbar-title-extra>
        <ui-badge variant="info">{{ membersResult?.total ?? 0 }} total</ui-badge>
      </ng-container>
    </ui-table-toolbar>

    <ui-loading *ngIf="isLoadingMembers" title="Loading members" message="Fetching the latest team roster."></ui-loading>

    <ui-data-table
      *ngIf="!isLoadingMembers"
      [columns]="columns"
      [rows]="membersResult?.items ?? []"
      emptyMessage="No members match your filters.">
    </ui-data-table>

    <ui-table-pagination
      *ngIf="!isLoadingMembers && membersResult"
      [page]="membersResult.page"
      [pageSize]="membersResult.pageSize"
      [total]="membersResult.total"
      (pageChange)="updatePagination($event)">
    </ui-table-pagination>
  </ui-card>

  <ui-card>
    <div class="card-header">
      <div>
        <h3>Pending invitations</h3>
        <p class="muted">Track invites that haven’t been accepted.</p>
      </div>
      <ui-badge variant="info">{{ invites.length }} pending</ui-badge>
    </div>

    <div class="invite-list" *ngIf="invites.length">
      <div class="invite-item" *ngFor="let invite of invites">
        <div>
          <strong>{{ invite.email }}</strong>
          <p class="muted">Role: {{ invite.role | titlecase }}</p>
        </div>
        <ui-button variant="ghost" [disabled]="!canInvite" (click)="resendInvite(invite)">
          Resend
        </ui-button>
      </div>
    </div>

    <ui-empty-state
      *ngIf="!invites.length"
      title="No pending invites"
      message="Invite teammates to start collaborating on projects."
      icon="group_add"
      [actionLabel]="canInvite ? 'Invite member' : ''"
      (action)="openInviteModal()">
    </ui-empty-state>
  </ui-card>

  <ui-modal
    [open]="inviteModalOpen"
    title="Invite a teammate"
    description="Send an invitation to join your workspace."
    (closed)="closeInviteModal()">
    <form class="invite-form" [formGroup]="inviteForm" (ngSubmit)="sendInvite()">
      <ui-field
        label="Full name"
        [error]="inviteForm.get('name')?.touched && inviteForm.get('name')?.invalid ? 'Name is required.' : ''">
        <input class="ui-input" type="text" autocomplete="name" formControlName="name" placeholder="Jane Doe" />
      </ui-field>

      <ui-field
        label="Email"
        [error]="inviteForm.get('email')?.touched && inviteForm.get('email')?.invalid ? 'Enter a valid email.' : ''">
        <input class="ui-input" type="email" autocomplete="email" formControlName="email" placeholder="jane@company.com" />
      </ui-field>

      <ui-field label="Role">
        <select class="ui-input" formControlName="role">
          <option value="owner">Owner</option>
          <option value="admin">Admin</option>
          <option value="member">Member</option>
          <option value="viewer">Viewer</option>
        </select>
      </ui-field>

      <div modal-actions class="modal-actions">
        <ui-button variant="ghost" type="button" (click)="closeInviteModal()">Cancel</ui-button>
        <ui-button type="submit">Send invite</ui-button>
      </div>
    </form>
  </ui-modal>
</section>
