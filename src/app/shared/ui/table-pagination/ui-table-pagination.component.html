<div class="pagination" *ngIf="total">
  <div class="range">
    Showing {{ rangeStart }}–{{ rangeEnd }} of {{ total }}
  </div>
  <div class="controls">
    <label class="page-size">
      Rows
      <select class="ui-input" [value]="pageSize" (change)="changePageSize(+$any($event.target).value)">
        <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
      </select>
    </label>
    <div class="buttons">
      <ui-button variant="ghost" size="sm" (click)="prev()" [disabled]="page === 1">Prev</ui-button>
      <span class="page">Page {{ page }} of {{ totalPages }}</span>
      <ui-button variant="ghost" size="sm" (click)="next()" [disabled]="page === totalPages">Next</ui-button>
    </div>
  </div>
</div>
